name: Supabase Keep-Alive

on:
  schedule:
    # 2 fois par semaine (Lundi et Jeudi à 12h00 UTC)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Requête Keep-Alive Supabase
        run: |
          curl -X GET "${{ secrets.TF_VAR_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}" \
            -w "\n✅ Ping effectué avec succès (Code: %{http_code})\n"
